version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: examforge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  parser:
    build:
      context: ./apps/parser
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    environment:
      - ENV=development

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/examforge
      - DIRECT_URL=postgresql://postgres:password@db:5432/examforge
      - BETTER_AUTH_SECRET=local-development-secret-key-12345
      - BETTER_AUTH_URL=http://localhost:3000
      - PARSER_SERVICE_URL=http://parser:8000
      - LOG_LEVEL=debug
      - NODE_ENV=development
    depends_on:
      db:
        condition: service_healthy
      parser:
        condition: service_healthy

volumes:
  pgdata:
