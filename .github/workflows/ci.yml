name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  web-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Typecheck
        run: pnpm run typecheck
        
      - name: Lint
        run: pnpm run lint
        
      - name: Run Tests
        run: pnpm run test

      - name: Build
        run: pnpm run build
        env:
          DATABASE_URL: "postgresql://postgres:password@localhost:5432/examforge"
          DIRECT_URL: "postgresql://postgres:password@localhost:5432/examforge"

  parser-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr poppler-utils
          
      - name: Install dependencies
        run: |
          cd apps/parser
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
          
      - name: Run Tests
        run: |
          cd apps/parser
          pytest
